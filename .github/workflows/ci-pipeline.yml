name: JHM CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Tests + Security Scan
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('jhm-pneumonia-cnn/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r jhm-pneumonia-cnn/requirements.txt
          pip install pytest httpx psycopg2-binary pytest-cov bandit safety

      - name: SAST - Escaneo de seguridad (bandit)
        run: bandit -r jhm-pneumonia-cnn/api jhm-pneumonia-cnn/src -ll -q || true

      - name: Vulnerabilidades en dependencias (safety)
        run: safety check -r jhm-pneumonia-cnn/requirements.txt --continue-on-error || true

      - name: Test de arquitectura CNN
        run: |
          cd jhm-pneumonia-cnn
          python src/model.py

      - name: Pytest con cobertura
        env:
          DATABASE_URL: "sqlite:///:memory:"
          TESTING: "true"
        run: |
          cd jhm-pneumonia-cnn
          pytest --cov=api --cov-report=xml --cov-report=term-missing -v

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: jhm-pneumonia-cnn/coverage.xml
          fail_ci_if_error: false
