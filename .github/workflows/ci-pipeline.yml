name: JHM AI Integration Continua (CI)

# El pipeline se activa automáticamente con cada git push en las ramas principales
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test_and_verify:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio desde la raíz del monorepo
    - name: Descargar codigo
      uses: actions/checkout@v4

    # 2. Configura el entorno de Python en el servidor de GitHub
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Cache de Pip para que las siguientes veces corra en segundos
    - name: Cache de dependencias
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('jhm-pneumonia-cnn/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Instala las librerías apuntando a la subcarpeta del backend
    - name: Instalar librerias y dependencias
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install -r jhm-pneumonia-cnn/requirements.txt
        pip install pytest httpx psycopg2-binary

    # 5. Corre la prueba de arquitectura de la IA entrando a la subcarpeta
    - name: Ejecutar Test de Arquitectura de la IA
      run: |
        cd jhm-pneumonia-cnn
        python src/model.py

    # 6. ¡NUEVO PASO! Ejecuta el laboratorio de pruebas automatizadas que creamos
    - name: Ejecutar Laboratorio de Pruebas (Pytest)
      env:
        DATABASE_URL: "sqlite:///:memory:"
      run: |
        cd jhm-pneumonia-cnn
        pytest