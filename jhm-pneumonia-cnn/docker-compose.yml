version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: jhm_postgres_db
    restart: always
    environment:
      POSTGRES_DB: jhm_pneumonia_auditoria
      POSTGRES_USER: jhm_user
      POSTGRES_PASSWORD: jhm_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jhm_user -d jhm_pneumonia_auditoria"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: .
    container_name: jhm_api_ia
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # 🔌 Vincula tu archivo .env local con el contenedor de Docker
    env_file:
      - .env
    volumes:
      - ./api:/app/api
      - ./src:/app/src
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: